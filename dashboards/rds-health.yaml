            "TextBoxes": [
              {
                "SheetTextBoxId": "813d5dc3-ffba-4e19-b8aa-ff3d890a0305",
                "Content": "<text-box>\n  <block align=\"center\">\n    <inline color=\"#f0f6f6\" font-size=\"25px\">\n      <b>RDS Health Dashboard - RHD</b>\n    </inline>\n  </block>\n</text-box>"
              },
              {
                "SheetTextBoxId": "a789e2f6-cab0-46c4-8160-177e61246484",
                "Content": "<text-box>\n  <inline color=\"#f0f6f6\" font-size=\"25px\">\n    <b>RDS Cost and Usage Dashboard</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">Comprehensive insights into AWS RDS usage and spending patterns across the organization showcasing cost distribution across accounts, database engines, and regions, with month-over-month cost trend.\u00a0</inline>\n  <br/>\n  <inline font-size=\"20px\">It includes analysis of RDS Extended Support charges and backup storage costs, that can help to track and optimize RDS cost and usage.\u00a0</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">For Detailed Cost and Usage Dashboard for all Service usage refer Cost Intelligence Dashboard  -\u00a0</inline>\n  <inline color=\"#56b5e0\" font-size=\"20px\">\n    <a href=\"https://catalog.workshops.aws/awscid/en-US/dashboards/foundational/cudos-cid-kpi#cudos-dashboard\" target=\"_self\">CUDOS Dashboard</a>\n  </inline>\n</text-box>"
              },
              {
                "SheetTextBoxId": "16cb165b-ab4d-4e34-a4a0-e06cab4eee52",
                "Content": "<text-box>\n  <inline color=\"#f0f6f6\" font-size=\"25px\">\n    <b>RDS Extended Support Analysis</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">RDS Extended Support allows you to continue running unsupported DB engine versions past the standard support end date, for an additional cost. It provides security updates, bug fixes, and support until you upgrade to a supported version.</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">Reference Documentation and blogs:</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/extended-support.html\" target=\"_blank\">\n          <u>Amazon RDS Extended Support with Amazon RDS</u>\n        </a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://aws.amazon.com/blogs/aws-cloud-financial-management/estimating-the-charges-for-amazon-rds-extended-support/\" target=\"_blank\">\n          <u>Estimating the charges for Amazon RDS Extended Support</u>\n        </a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://catalog.workshops.aws/awscid/en-US/dashboards/advanced/extended-support-cost-projection\" target=\"_blank\">\n          <u>Extended Support - Cost Projection Dashboard</u>\n        </a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "029a8c69-3da2-4d37-891e-8bb8f7dff33f",
                "Content": "<text-box>\n  <br/>\n  <inline color=\"#f0f6f6\" font-size=\"25px\">\n    <b>RDS Backup Usage Cost Summary</b>\n  </inline>\n</text-box>"
              },
              {
                "SheetTextBoxId": "74168a0e-1882-406d-bf02-f041899d84c4",
                "Content": "<text-box>\n  <inline font-size=\"32px\">&#128221;\u00a0</inline>\n  <inline color=\"#f0f6f6\" font-size=\"35px\">RDS Unblended Cost and Usage for last 60 days</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>Collection Date Filter</b>\n  </inline>\n  <inline font-size=\"16px\">\u00a0: View historical DB inventory details by selecting a specific date</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>Quick Tips :</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Export the data to CSV / Excel for detailed offline analysis</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Use Athena to query the base tables and views for custom filtering and analysis</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Use CUR Query Library with curated SQL queries to get started with analyzing the Cost and Usage Report data</inline>\n    </li>\n  </ul>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>Additional Resources :</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"16px\">\n        <a href=\"https://catalog.workshops.aws/cur-query-library/en-US/queries\" target=\"_blank\">AWS Well-Architected Cost &amp; Usage Report Library</a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"16px\">\n        <a href=\"https://docs.aws.amazon.com/athena/latest/ug/querying-athena-tables.html\" target=\"_blank\">Athena Query Best Practices Guide</a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "d3ec8c30-a69c-4d5f-926f-99075ddc3cfc",
                "Content": "<text-box>\n  <br/>\n  <inline color=\"#f0f6f6\" font-size=\"25px\">\n    <b>RDS KPI Summary</b>\n  </inline>\n</text-box>"
              },
