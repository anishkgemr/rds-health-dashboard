  rds_tags_view:
    data: |-
      CREATE OR REPLACE VIEW "${athena_database_name}".rds_tags_view AS 
                                  SELECT DISTINCT
                                    a.dbinstanceidentifier
                                  , a.dbinstancearn
                                  , concat(tag.Key, ':', tag.Value) tag_info
                                  FROM
                                    ("${data_collection_database_name}".rds_analysis_data a
                                  CROSS JOIN UNNEST(a.taglist) t (tag))
    parameters:
      data_collection_database_name:
        default: optimization_data
        global: True

