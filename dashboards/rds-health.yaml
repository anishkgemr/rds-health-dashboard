                              , rds_analysis_data.payer_id
                              , rds_analysis_data.year
                              , rds_analysis_data.month
                              , rds_analysis_data.day
                          FROM "${data_collection_database_name}".rds_analysis_data
                          LEFT JOIN latest_instance_snapshots s ON (
                              s.accountid = rds_analysis_data.accountid 
                              AND s.dbinstanceidentifier = rds_analysis_data.dbinstanceidentifier 
                              AND s.maxsnapshotcreatetime = 1 
                              AND rds_analysis_data.dbclusteridentifier IS NULL 
                              AND date(parse_datetime(s.collection_date, 'yyyy-MM-dd HH:mm:ss')) = date(parse_datetime(rds_analysis_data.collection_date, 'yyyy-MM-dd HH:mm:ss'))
                          )
                          LEFT JOIN "${data_collection_database_name}".organization_data ON "${data_collection_database_name}".rds_analysis_data.accountid = organization_data.id
