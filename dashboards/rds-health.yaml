                    "CustomNarrative": {
                      "Narrative": "<narrative>\n  &#128200;\n  <inline font-size=\"22.4px\">\u00a0RDS DB Unblended Cost month over month insights for\u00a0</inline>\n  <inline font-size=\"22.4px\">\n    <b>\n      <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n    </b>\n  </inline>\n  <br/>\n  <if condition=\"PeriodOverPeriod.hasData = false\" level=\"block\">\n    No Data Available for the month of\u00a0\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n  </if>\n  <br/>\n  <br/>\n  <if condition=\"PeriodOverPeriod.hasData = true\" level=\"block\">\n    <inline font-size=\"19.2px\">Total RDS Unblended Cost for\u00a0</inline>\n    <inline font-size=\"19.2px\">\n      <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n    </inline>\n    <if condition=\"PeriodOverPeriod.percentDifference.value &gt;= 0\" level=\"inline\">\n      <inline color=\"Accent\" font-size=\"19.2px\">\n        <b>\u00a0increased by\u00a0</b>\n      </inline>\n    </if>\n    <if condition=\"PeriodOverPeriod.percentDifference.value &lt; 0\" level=\"inline\">\n      <inline color=\"Accent\" font-size=\"19.2px\">\n        <b>\u00a0decreased by\u00a0</b>\n      </inline>\n    </if>\n    <inline color=\"Accent\" font-size=\"19.2px\">\n      <b>\n        <expression>PeriodOverPeriod.percentDifference.formattedAbsoluteValue</expression>\n      </b>\n    </inline>\n    <inline color=\"Accent\" font-size=\"19.2px\">\n      <b>\u00a0</b>\n    </inline>\n    <inline color=\"Accent\" font-size=\"19.2px\">\n      <b>\n        <expression>PeriodOverPeriod.absoluteDifference.formattedValue</expression>\n      </b>\n    </inline>\n    <inline font-size=\"19.2px\">\u00a0from\u00a0</inline>\n    <inline font-size=\"19.2px\">\n      <expression>PeriodOverPeriod.previousMetricValue.formattedValue</expression>\n    </inline>\n    <inline font-size=\"19.2px\">\u00a0to\u00a0</inline>\n    <inline font-size=\"19.2px\">\n      <expression>PeriodOverPeriod.currentMetricValue.formattedValue</expression>\n    </inline>\n    <inline font-size=\"19.2px\">.</inline>\n  </if>\n  <br/>\n  <br/>\n  <br/>\n  \u2197\ufe0f\u00a0\n  <inline font-size=\"22.4px\">Top Movers:</inline>\n  <br/>\n  <if condition=\"TopMovers.itemsCount &lt; 1\" level=\"block\">\n    <inline font-size=\"19.2px\">&#128314; There is no Top Movers for the Month of\u00a0</inline>\n    <inline font-size=\"19.2px\">\n      <b>\n        <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n      </b>\n    </inline>\n  </if>\n  <br/>\n  <if condition=\"TopMovers.itemsCount &gt; 1\" level=\"block\">\n    <inline font-size=\"19.2px\">&#128314; There is/are\u00a0\u00a0</inline>\n    <inline font-size=\"19.2px\">\n      <b>\n        <expression>TopMovers.itemsCount</expression>\n      </b>\n    </inline>\n    <inline font-size=\"19.2px\">\u00a0Top Movers for the month of\u00a0</inline>\n    <inline font-size=\"19.2px\">\n      <b>\n        <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n      </b>\n    </inline>\n  </if>\n  <br/>\n  <for level=\"block\" listExpression=\"TopMovers.items\">\n    <ul>\n      <li class=\"ql-indent-0\">\n        <inline font-size=\"19.2px\">Account\u00a0</inline>\n        <inline font-size=\"19.2px\">\n          <b>\n            <expression>TopMovers.items[index].categoryValue.value</expression>\n          </b>\n        </inline>\n        <inline font-size=\"19.2px\">\u00a0spend increased from\u00a0</inline>\n        <inline font-size=\"19.2px\">\n          <b>\n            <expression>TopMovers.items[index].previousMetricValue.formattedValue</expression>\n          </b>\n        </inline>\n        <inline font-size=\"19.2px\">\u00a0to\u00a0</inline>\n        <inline font-size=\"19.2px\">\n          <b>\n            <expression>TopMovers.items[index].currentMetricValue.formattedValue</expression>\n          </b>\n        </inline>\n        <inline font-size=\"19.2px\">\u00a0</inline>\n      </li>\n    </ul>\n  </for>\n  <br/>\n  <br/>\n  <br/>\n  \u2198\ufe0f\u00a0\n  <inline font-size=\"22.4px\">Bottom Movers:\u00a0</inline>\n  <br/>\n  <if condition=\"BottomMovers.itemsCount &lt; 1\" level=\"block\">\n    &#128315;\n    <inline font-size=\"19.2px\">\u00a0There is no Bottom Movers for the Month of\u00a0</inline>\n    <inline font-size=\"19.2px\">\n      <b>\n        <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n      </b>\n    </inline>\n  </if>\n  <br/>\n  <if condition=\"BottomMovers.itemsCount &gt; 1\" level=\"block\">\n    &#128315;\n    <inline font-size=\"19.2px\">\u00a0There is/are\u00a0</inline>\n    <inline font-size=\"19.2px\">\n      <b>\n        <expression>BottomMovers.itemsCount</expression>\n      </b>\n    </inline>\n    <inline font-size=\"19.2px\">\u00a0Bottom Movers for the month of\u00a0</inline>\n    <inline font-size=\"19.2px\">\n      <b>\n        <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n      </b>\n    </inline>\n  </if>\n  <br/>\n  <for level=\"block\" listExpression=\"BottomMovers.items\">\n    <ul>\n      <li class=\"ql-indent-0\">\n        <inline font-size=\"19.2px\">Account\u00a0</inline>\n        <inline font-size=\"19.2px\">\n          <b>\n            <expression>BottomMovers.items[index].categoryValue.formattedValue</expression>\n          </b>\n        </inline>\n        <inline font-size=\"19.2px\">\u00a0spend decreased from\u00a0</inline>\n        <inline font-size=\"19.2px\">\n          <b>\n            <expression>BottomMovers.items[index].previousMetricValue.formattedAbsoluteValue</expression>\n          </b>\n        </inline>\n        <inline font-size=\"19.2px\">\u00a0to\u00a0</inline>\n        <inline font-size=\"19.2px\">\n          <b>\n            <expression>BottomMovers.items[index].currentMetricValue.formattedAbsoluteValue</expression>\n          </b>\n        </inline>\n        <inline font-size=\"19.2px\">\u00a0</inline>\n      </li>\n    </ul>\n  </for>\n  <br/>\n  <br/>\n  <br/>\n  <br/>\n  <br/>\n  <br/>\n</narrative>"
                    }
