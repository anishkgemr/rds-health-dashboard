        global: True

  rds_analysis_daily_backup_view:
    data: |-
      CREATE OR REPLACE VIEW "${athena_database_name}".rds_analysis_daily_backup_view AS
                          WITH latest_instance_snapshots AS (
                              SELECT *,
                              ROW_NUMBER() OVER (
                                  PARTITION BY accountid, dbinstanceidentifier, 
                                  date(parse_datetime(collection_date, 'yyyy-MM-dd HH:mm:ss')) 
                                  ORDER BY from_iso8601_timestamp(snapshotcreatetime) DESC
                              ) maxsnapshotcreatetime
                              FROM "${data_collection_database_name}".inventory_rds_db_snapshots_data
                          )
                          SELECT
                              rds_analysis_data.dbinstanceidentifier
                              , rds_analysis_data.dbinstanceclass
                              , rds_analysis_data.engine
                              , rds_analysis_data.masterusername
                              , rds_analysis_data.endpoint
                              , rds_analysis_data.allocatedstorage
                              , rds_analysis_data.instancecreatetime
                              , rds_analysis_data.preferredbackupwindow
                              , rds_analysis_data.backupretentionperiod
