                      "Narrative": "<narrative>\n  <inline font-size=\"19.2px\">\n    <b>&#128202; RDS Snapshot Backup Coverage Analysis - Account View - Last 7 Days</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"19.2px\">\n    <b>Top\u00a0</b>\n  </inline>\n  <if condition=\"Top.itemsCount &gt; 1\" level=\"inline\">\n    <inline font-size=\"19.2px\">\n      <b>\n        <expression>Top.itemsCount</expression>\n      </b>\n    </inline>\n    <inline font-size=\"19.2px\">\n      <b>\u00a0</b>\n    </inline>\n  </if>\n  <inline font-size=\"19.2px\">\n    <b>\n      <expression>Top.categoryField.name</expression>\n    </b>\n  </inline>\n  <inline font-size=\"19.2px\">\n    <b>\u00a0with total Backup Percentage per account\u00a0</b>\n  </inline>\n  <if condition=\"Top.itemsCount &gt; 1\" level=\"inline\">\n    <inline font-size=\"19.2px\">\n      <b>are:</b>\n    </inline>\n  </if>\n  <if condition=\"Top.itemsCount &lt; 2\" level=\"inline\">\n    <inline font-size=\"19.2px\">\n      <b>\u00a0is:</b>\n    </inline>\n  </if>\n  \u00a0\n  <br/>\n  <for level=\"block\" listExpression=\"Top.items\">\n    <ul>\n      <li class=\"ql-indent-0\">\n        Account\u00a0\u00a0\n        <expression>Top.items[index].categoryValue.value</expression>\n        \u00a0\u00a0with Backup Coverage  of\u00a0\u00a0\n        <if condition=\"Top.items[index].metricValue.value &gt;= 0.9 and Top.items[index].metricValue.value &lt; 1\" level=\"inline\">\n          <inline color=\"#f0cc16\">\n            <b>\n              <expression>Top.items[index].metricValue.formattedValue</expression>\n            </b>\n          </inline>\n        </if>\n        <if condition=\"Top.items[index].metricValue.value &gt;= 0.5 and Top.items[index].metricValue.value &lt; 0.9\" level=\"inline\">\n          \ufeff\n          <inline color=\"#ed9a65\">\n            <b>\n              <expression>Top.items[index].metricValue.formattedValue</expression>\n            </b>\n          </inline>\n        </if>\n        <if condition=\"Top.items[index].metricValue.value &lt; 0.5\" level=\"inline\">\n          <inline color=\"#e86b5f\">\n            <b>\n              <expression>Top.items[index].metricValue.formattedValue</expression>\n            </b>\n          </inline>\n        </if>\n        <if condition=\"Top.items[index].metricValue.value = 1\" level=\"inline\">\n          <inline color=\"#92ac61\">\n            <b>\n              <expression>Top.items[index].metricValue.formattedValue</expression>\n            </b>\n          </inline>\n        </if>\n      </li>\n    </ul>\n  </for>\n  <br/>\n  <br/>\n  <if condition=\"TotalAggregate.totalAggregate.value = 1\" level=\"block\">\n    <inline font-size=\"19.2px\">\n      <b>&#128161; Key Insights:</b>\n    </inline>\n    <br/>\n    <ul>\n      <li class=\"ql-indent-0\">\n        All\u00a0\n        <expression>Top.itemsCount</expression>\n        \u00a0Accounts at 100% RDS Backups coverage \u2705\n      </li>\n      <li class=\"ql-indent-0\">Full backup compliance maintained \u2705</li>\n      <li class=\"ql-indent-0\">Target: 100% coverage for all accounts \u2705</li>\n    </ul>\n    <br/>\n  </if>\n  <br/>\n  <br/>\n  <if condition=\"TotalAggregate.totalAggregate.value &lt; 1\" level=\"block\">\n    <inline font-size=\"19.2px\">\n      <b>&#128161; Key Insights:</b>\n    </inline>\n    <br/>\n    <ul>\n      <li class=\"ql-indent-0\">Review Backup policies for all accounts with backup percentage &lt; 100% &#128993;\u00a0</li>\n      <li class=\"ql-indent-0\">Investigate the reason for non-availability of RDS backups &#128993;\u00a0</li>\n      <li class=\"ql-indent-0\">Target : 100% backup coverage for all accounts &#128993;\u00a0</li>\n    </ul>\n    <br/>\n  </if>\n  <br/>\n</narrative>"
