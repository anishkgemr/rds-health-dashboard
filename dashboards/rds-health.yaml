            "TextBoxes": [
              {
                "SheetTextBoxId": "eace2a1b-d1c1-43ac-84b8-0423f2fd5106",
                "Content": "<text-box>\n  <block align=\"center\">\n    <inline color=\"#f0f6f6\" font-size=\"25px\">\n      <b>RDS Health Dashboard - RHD</b>\n    </inline>\n  </block>\n</text-box>"
              },
              {
                "SheetTextBoxId": "af53f712-f670-4448-9906-cf651b152c5b",
                "Content": "<text-box>\n  <inline color=\"#f0f6f6\" font-size=\"30px\">\n    <b>RDS DB Version and End Of Support Analysis</b>\n  </inline>\n  <inline color=\"#f0f6f6\" font-size=\"40px\">\u00a0</inline>\n  <inline font-size=\"32px\">&#128202;</inline>\n</text-box>"
              },
              {
                "SheetTextBoxId": "2398ebe0-ed22-4f5c-8bee-af0095b5e61b",
                "Content": "<text-box>\n  <inline font-size=\"32px\">&#128221;\u00a0</inline>\n  <inline color=\"#f0f6f6\" font-size=\"35px\">RDS DB Inventory View</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>Collection Date Filter</b>\n  </inline>\n  <inline font-size=\"16px\">\u00a0: View historical DB inventory details by selecting a specific date</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>Quick Tips :</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Export the data to CSV / Excel for detailed offline analysis</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Use Athena to query the base tables and views for custom filtering and analysis</inline>\n    </li>\n  </ul>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>Additional Resources :</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"16px\">\n        <a href=\"https://docs.aws.amazon.com/athena/latest/ug/querying-athena-tables.html\" target=\"_blank\">Athena Query Best Practices Guide</a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "006a2439-83e5-451d-a392-e078b4a25d02",
                "Content": "<text-box>\n  <inline color=\"#f0f6f6\" font-size=\"25px\">\n    <b>RDS Inventory Dashboard</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">A consolidated view of Amazon RDS database instances across your organization, providing insights into version status, security configurations, backup settings, and operational health. Use this dashboard to identify upgrade requirements, review resilence and security best practices, and plan database maintenance activities.</inline>\n</text-box>"
              },
              {
                "SheetTextBoxId": "f57e381c-b845-4e82-9e9e-a1ca2ed748f3",
                "Content": "<text-box>\n  <inline font-size=\"20px\">\n    <b>RDS Database Backup Insights</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">Amazon RDS automated backups provide a reliable way to protect your data by creating backups of your database at regular intervals and retaining them for a specified period. It ensures that you can recover to almost any point within the retention period without manual intervention in fully automated process.</inline>\n  <br/>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">RDS Backup Management Documentation and Blogs for reference :</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_ManagingAutomatedBackups.html\" target=\"_blank\">\n          <u>Managing automated backups</u>\n        </a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_WorkingWithAutomatedBackups.Enabling.html\" target=\"_blank\">\n          <u>Enabling Automated Backups</u>\n        </a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://aws.amazon.com/rds/faqs/#Automatic_Backups_and_Database_Snapshots:~:text=Automatic%20Backups%20and%20Database%20Snapshots,-Close%20all\" target=\"_blank\">\n          <u>Automatic Backups and Database Snapshots</u>\n        </a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "b6e638b7-f938-4add-a35a-d90497339bb0",
                "Content": "<text-box>\n  <inline font-size=\"20px\">\n    <b>RDS Database Encryption Insights</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">RDS Storage encryption secures sensitive data at rest including databases, backups, and snapshots using industry-standard encryption algorithm. You can encrypt Amazon RDS DB instances with AWS KMS keys, either an AWS managed key or a customer managed key.</inline>\n  <br/>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">Reference Documentation:</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/prescriptive-guidance/latest/encryption-best-practices/rds.html\" target=\"_blank\">Encryption best practices for Amazon RDS</a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Overview.Encryption.html\" target=\"_blank\">Encrypting Amazon RDS resources</a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "3b235713-2ed8-42fc-b811-7c03b7e77a50",
                "Content": "<text-box>\n  <inline font-size=\"20px\">Keeping RDS databases updated with latest Major and Minor version provides multiple benefits: enhanced security through patched vulnerabilities, improved performance from optimized query engines and resource utilization, access to new features that can streamline operations, and continued vendor support avoiding any extended support cost.</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">Reference Documentation</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.Upgrading.html\" target=\"_blank\">Upgrading a DB instance engine version</a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/extended-support.html\" target=\"_blank\">Amazon RDS Extended Support with\u00a0Amazon RDS</a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "023b533e-6dbf-40c7-a3bf-c2393eab65bb",
                "Content": "<text-box>\n  <inline font-size=\"20px\">\n    <b>Amazon RDS best practice Insights</b>\n  </inline>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"20px\">Deploy Multi-AZ configurations for high availability with automatic failover capabilities</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"20px\">Enable storage autoscaling with appropriate thresholds to prevent capacity issues</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"20px\">Schedule maintenance windows during low-traffic periods</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"20px\">Activate performance Insights for monitoring database load and troubleshooting</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"20px\">Encrypt in transit using SSL/TLS connections with Active CA Certificates</inline>\n    </li>\n  </ul>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">Reference Documentation:</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/CHAP_BestPractices.html\" target=\"_blank\">Best practices for Amazon RDS</a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "4e701c0c-4fd4-435e-818c-88ea58abb055",
                "Content": "<text-box>\n  <inline font-size=\"20px\">RDS Major and Minor version percentage</inline>\n</text-box>"
              },
              {
                "SheetTextBoxId": "95dfbeae-98a5-4b34-9b96-eeea53b149b1",
                "Content": "<text-box>\n  <inline font-size=\"20px\">\n    <b>RDS End Of Standard and Extended Support Dates</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline color=\"#f5f6f9\" font-size=\"18px\">RDS Standard Support and Extended Support dates for RDS MySQL, RDS MariaDB, RDS PostgreSQL, Aurora MySQL, and Aurora PostgreSQL engine versions.</inline>\n  <br/>\n  <inline font-size=\"18px\">You can refer to below AWS documentation for detailed end of support dates for these mentioned engines.\u00a0\u00a0</inline>\n  <br/>\n  <inline font-size=\"18px\">It doesn't include commercial RDS DB Engines (Db2, SQL Server, and Oracle).</inline>\n  <br/>\n  <br/>\n  <br/>\n  <inline font-size=\"18px\">Reference Documentation:</inline>\n  <br/>\n  <inline font-size=\"18px\">\u00a0Amazon RDS</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"18px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/PostgreSQLReleaseNotes/postgresql-release-calendar.html\" target=\"_self\">PostgreSQL</a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"18px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/MySQL.Concepts.VersionMgmt.html\" target=\"_self\">MySQL</a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"18px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/MariaDB.Concepts.VersionMgmt.html\" target=\"_blank\">MariaDB</a>\n      </inline>\n    </li>\n  </ul>\n  <br/>\n  <inline font-size=\"18px\">\u00a0Amazon Aurora</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"18px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/AuroraPostgreSQLReleaseNotes/aurorapostgresql-release-calendar.html\" target=\"_self\">PostgreSQL-Compatible Edition</a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"18px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/AuroraMySQLReleaseNotes/AuroraMySQL.release-calendars.html\" target=\"_self\">MySQL-Compatible Edition</a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "a0d4b40e-09f4-47a5-805a-24067d25bc1f",
                "Content": "<text-box>\n  <inline font-size=\"18px\">Note</inline>\n  <inline font-size=\"16px\">:</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Minor versions can reach the end of standard support before the corresponding major versions.\u00a0</inline>\n    </li>\n    <li class=\"ql-indent-1\">\n      <inline font-size=\"16px\">For example, PostgreSQL minor version 14.9 can reach its end of standard support in March 2025, while major version 14 will reach its end of standard support in February 2027.</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Minor versions can also reach end of Extended Support before major versions do.\u00a0</inline>\n    </li>\n    <li class=\"ql-indent-0\"/>\n    <li class=\"ql-indent-1\">\n      <inline font-size=\"16px\">For example, minor version 5.7.44-RDS.20240529 reaches its end of Extended Support date in September 2025 while major version 5.7 reaches this date on February 28, 2027.\u00a0</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Amazon RDS will support additional minor versions between these dates.\u00a0</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">We recommend that you upgrade to the latest available minor version as often as possible for all major versions.</inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "f901d753-e0d9-443e-99f5-7334fa503ed0",
                "Content": "<text-box>\n  <inline font-size=\"20px\">\n    <b>RDS DB Maintenance Window</b>\n  </inline>\n  <br/>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"20px\">Amazon RDS periodically performs maintenance on the resources associated with your DB instances. This includes updates to the underlying hardware, operating system, and database engine version.</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"20px\">Operating system updates are often done for security reasons, and Amazon RDS recommends applying these updates as soon as possible.</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"20px\">You can find more details on applying updates to your DB instance in\u00a0</inline>\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.Maintenance.html#USER_UpgradeDBInstance.OSUpgrades\" target=\"_blank\">Applying updates to a DB instance\u00a0</a>\n      </inline>\n      <inline font-size=\"20px\">section.</inline>\n    </li>\n  </ul>\n  <br/>\n  \t\t\n  <br/>\n  <inline font-size=\"20px\">Reference Documentation:</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_UpgradeDBInstance.Maintenance.html#USER_UpgradeDBInstance.Maintenance.Overview\" target=\"_blank\">Overview of\u00a0DB instance\u00a0maintenance updates</a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "e70c5f89-2147-47b2-ac40-d0a3a207266e",
                "Content": "<text-box>\n  <inline font-size=\"15px\">Use the filter condition to compare the current RDS database major and minor versions against the latest versions and previous supported versions.</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"15px\">\n    <b>What You Can Compare:</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"15px\">Current version vs Latest available version N</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"15px\">Current version vs Latest version N - 1</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"15px\">Current version vs Latest version N - 2</inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "72675799-4c21-4c41-9e3b-c0f6b902b369",
                "Content": "<text-box>\n  <br/>\n  <inline color=\"#f0f6f6\" font-size=\"30px\">\n    <b>RDS DB Backup, Encryption, Reslience and Security Insights</b>\n  </inline>\n</text-box>"
              }
            ],
