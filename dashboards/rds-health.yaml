            "TextBoxes": [
              {
                "SheetTextBoxId": "fe6a0e36-54fc-441b-a628-7d866033f653",
                "Content": "<text-box>\n  <block align=\"center\">\n    <inline color=\"#f0f6f6\" font-size=\"25px\">\n      <b>RDS Health Dashboard - RHD</b>\n    </inline>\n  </block>\n</text-box>"
              },
              {
                "SheetTextBoxId": "e759e00e-46d5-4005-ba31-58eb5a872a18",
                "Content": "<text-box>\n  <inline color=\"#f0f6f6\" font-size=\"25px\">\n    <b>RDS Snapshot Backup Dashboard</b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">Comprehensive insights into RDS snapshot backups across AWS accounts, regions, and DB engines, providing analysis on backup coverage and trends, enabling quick identification of backup issues to help maintain a robust RDS backup and recovery readiness.</inline>\n  <br/>\n</text-box>"
              },
              {
                "SheetTextBoxId": "251a2ec0-b6ab-441c-9f33-5f1196c7329b",
                "Content": "<text-box>\n  <br/>\n  <inline font-size=\"20px\">Amazon RDS provides automated daily backups of your databases, as well as the ability to create user-initiated database snapshots. You can restore your DB instance to any point-in-time during the backup retention period, and share or copy database snapshots across AWS accounts and regions.\u00a0</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"20px\">Reference Documentation &amp; Blogs :</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_WorkingWithAutomatedBackups.html\" target=\"_blank\">\n          <u>Introduction to backups</u>\n        </a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://aws.amazon.com/rds/faqs/#Automatic_Backups_and_Database_Snapshots:~:text=Automatic%20Backups%20and%20Database%20Snapshots,-Close%20all\" target=\"_blank\">\n          <u>Automatic Backups and Database Snapshots</u>\n        </a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://aws.amazon.com/blogs/database/amazon-rds-snapshot-restore-and-recovery-demystified/\" target=\"_blank\">\n          <u>Amazon RDS: Snapshot, restore, and recovery demystified</u>\n        </a>\n      </inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"20px\">\n        <a href=\"https://aws.amazon.com/blogs/database/implementing-a-disaster-recovery-strategy-with-amazon-rds/\" target=\"_blank\">\n          <u>Implementing a disaster recovery strategy with Amazon RDS</u>\n        </a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "90146d89-48ed-46f1-928f-9da002e593a6",
                "Content": "<text-box>\n  <inline font-size=\"32px\">&#128221;\u00a0</inline>\n  <inline color=\"#f0f6f6\" font-size=\"35px\">RDS DB snapshot Backup History for last 30 days</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>Collection Date Filter</b>\n  </inline>\n  <inline font-size=\"16px\">\u00a0: View historical DB inventory details by selecting a specific date</inline>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>Quick Tips :</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Export the data to CSV / Excel for detailed offline analysis</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"16px\">Use Athena to query the base tables and views for custom filtering and analysis</inline>\n    </li>\n  </ul>\n  <br/>\n  <br/>\n  <inline font-size=\"16px\">\n    <b>Additional Resources :</b>\n  </inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline color=\"#56b5e0\" font-size=\"16px\">\n        <a href=\"https://docs.aws.amazon.com/athena/latest/ug/querying-athena-tables.html\" target=\"_blank\">Athena Query Best Practices Guide</a>\n      </inline>\n    </li>\n  </ul>\n</text-box>"
              },
              {
                "SheetTextBoxId": "845ec33b-ce05-4452-93b9-20d61c846b92",
                "Content": "<text-box>\n  <br/>\n  <inline font-size=\"18px\">\n    <b>Select the Date for</b>\n  </inline>\n  <inline font-size=\"18px\">\u00a0below RDS Backup KPI,</inline>\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"18px\">Total RDS Databases</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"18px\">Average Backup Percentage</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"18px\">RDS DBs without backup for 24 hours</inline>\n    </li>\n    <li class=\"ql-indent-0\">\n      <inline font-size=\"18px\">RDS DBs with backup retention set to 0</inline>\n    </li>\n  </ul>\n</text-box>"
              }
            ],
