        "CalculatedFields": [
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "Backup - Last30Days",
            "Expression": "concat(formatDate(addDateTime(-30, 'DD', now()),'dd-MMM-yyyy'),' - ',formatDate(now(),'dd-MMM-yyyy'))"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "Backup - Last7Days",
            "Expression": "concat(formatDate(addDateTime(-7, 'DD', now()),'dd-MMM-yyyy'),' - ',formatDate(now(),'dd-MMM-yyyy'))"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "BackupAvailable<24Hours",
            "Expression": "ifelse(dateDiff(parseDate(snapshotcreatetime),now(),\"HH\") <= 24,1,0)"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "BackupAvailable<30Days",
            "Expression": "ifelse(dateDiff(parseDate(snapshotcreatetime),parseDate({collection_date}),\"DD\") <= 30,1,0)"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "BackupAvailable<7Days",
            "Expression": "ifelse(dateDiff(parseDate(snapshotcreatetime),now(),\"DD\") <= 7,1,0)"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "BackupPercentage(24hrs)",
            "Expression": "ifelse(dateDiff(parseDate(snapshotcreatetime),parseDate({collection_date}),\"HH\") <= 24,1,0)"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "CollectionDay",
            "Expression": "parseDate({collection_date},'yyyy-MM-dd HH:mm:ss')"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "RDS Console Link",
            "Expression": "toString('RDS Console Link')"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "RDS_backup_status",
            "Expression": "countIf(dbinstanceidentifier, {BackupPercentage(24hrs)} = 0)"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "RDS_primaryreplica_status",
            "Expression": "ifelse(isNull(readreplicasourcedbinstanceidentifier),\"PrimaryDB\",\"ReadReplica\")"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "accountid_pivot",
            "Expression": "coalesce(accountid,'0')"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "backup_retention_status",
            "Expression": "ifelse(backupretentionperiod=0,1,0)"
          },
          {
            "DataSetIdentifier": "rds_analysis_daily_backup_dataset7",
            "Name": "collectiondatepivot",
            "Expression": "coalesce({collection_date},'0')"
          },
          {
            "DataSetIdentifier": "rds_analysis_dataset7",
            "Name": "AWS Console Link",
            "Expression": "/*\n(AI generated) rds console link with region and accountid field\n*/\nconcat('https://console.aws.amazon.com/rds/home?region=', region, '&account=', accountid)"
          },
          {
            "DataSetIdentifier": "rds_analysis_dataset7",
            "Name": "CollectionDay",
            "Expression": "parseDate({collection_date},'yyyy-MM-dd HH:mm:ss')"
          },
          {
            "DataSetIdentifier": "rds_analysis_dataset7",
            "Name": "DBEngine_Major_Version",
            "Expression": "ifelse({DB_Engine_Name}=${pDBEngine} and {DB_Engine_Region}=${pDBEngineRegion},${pSelectMajorVersion},NULL)"
          },
          {
            "DataSetIdentifier": "rds_analysis_dataset7",
            "Name": "DB_Engine_Name",
            "Expression": "ifelse(${pDBEngine}=engine and ${pDBEngineRegion}=region,${pDBEngine},NULL)"
          },
          {
            "DataSetIdentifier": "rds_analysis_dataset7",
            "Name": "DB_Engine_Region",
