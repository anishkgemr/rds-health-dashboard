                          , rds_analysis_data.year
                          , rds_analysis_data.month
                          , rds_analysis_data.day
                          FROM
                            (("${data_collection_database_name}".rds_analysis_data
                          LEFT JOIN "${data_collection_database_name}".organization_data ON (rds_analysis_data.accountid = organization_data.id))
                          LEFT JOIN "${data_collection_database_name}".rds_maintenance_data ON ((rds_maintenance_data.resourceidentifier = rds_analysis_data.dbinstancearn) 
                          AND (rds_maintenance_data.accountid = rds_analysis_data.accountid) 
                          AND (date(CAST(rds_maintenance_data.collection_date AS timestamp)) = date(CAST(rds_analysis_data.collection_date AS timestamp))) 
                          AND (rds_maintenance_data.region = rds_analysis_data.region) AND (rds_maintenance_data.payer_id = rds_analysis_data.payer_id)))
    parameters:
      data_collection_database_name:
        default: optimization_data
        global: True

  rds_cost_summary_view:
    data: |-
      CREATE OR REPLACE VIEW "${athena_database_name}".rds_cost_summary_view AS
      WITH resource_agg AS (
          SELECT 
              linked_account_id,
              usage_date,
              region,
              product_code,
              usage_type,
              ARRAY_JOIN(ARRAY_AGG(DISTINCT resource_id), ', ') as resource_ids
          FROM "${cur_database_name}".resource_view
          WHERE product_code = 'AmazonRDS'
          GROUP BY linked_account_id, usage_date, region, product_code, usage_type
      )
      SELECT 
          a.account_id,
          a.account_name,
          s.payer_account_id,
          s.billing_period,
          s.usage_date,
          r.resource_ids as resource_id,
          s.product_code,
          s.service,
          s.product_name,
          s.product_family,
          s.region,
          s.availability_zone,
          s.instance_type_family,
          s.instance_type,
          s.processor,
          s.processor_features,
          s.current_generation,
          s.platform,
          s.database_engine,
          s.usage_type,
          s.operation,
          s.charge_type,
          s.charge_category,
          s.purchase_option,
          s.pricing_unit,
          s.usage_quantity,
          s.unblended_cost,
          s.amortized_cost,
          s.public_cost,
          s.ri_sp_arn,
          s.ri_sp_upfront_fees,
          s.ri_sp_trueup,
          s.year,
          s.month
      FROM "${cur_database_name}".summary_view s
      INNER JOIN "${cur_database_name}".account_map a
          ON s.linked_account_id = a.account_id
      LEFT JOIN resource_agg r
          ON s.linked_account_id = r.linked_account_id
          AND s.usage_date = r.usage_date
          AND s.region = r.region
          AND s.product_code = r.product_code
          AND s.usage_type = r.usage_type
      WHERE s.product_code = 'AmazonRDS'
    parameters:
      cur_database_name:
        default: cid_cur
        description: Database containing CID views (summary_view, resource_view, account_map)
        global: True
      athena_database_name:
        default: optimization_data
        global: True

