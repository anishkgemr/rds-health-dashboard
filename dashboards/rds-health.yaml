          {
            "DataSetIdentifier": "rds_analysis_dataset7",
            "Name": "extract_current_minor_version",
            "Expression": "// First check if it's an Aurora version or RDS Oracle version\nifelse(\n    locate({current_minor_version},'aurora') > 0,\n    // Aurora version handling - modified weights and parsing\n    (coalesce(parseInt(split({current_minor_version}, '.', 1)), 0) * 10000000000 +\n     coalesce(parseInt(split({current_minor_version}, '.', 2)), 0) * 1000000000 +\n     coalesce(parseInt(split(split({current_minor_version}, 'aurora.', 2), '.', 1)), 0) * 1000000 +\n     // Handle the double-digit version numbers (04, 09) by padding\n     coalesce(parseInt(split(split({current_minor_version}, 'aurora.', 2), '.', 2)), 0) * 1000 +\n     coalesce(parseInt(split(split({current_minor_version}, 'aurora.', 2), '.', 3)), 0)),\n    \n    // Check if it's RDS Oracle version (contains 'ru-')\n    ifelse(\n        locate({current_minor_version},'ru-') > 0,\n        // Oracle version handling\n        (// Base version (19) -> 19000000000\n        coalesce(parseInt(split({current_minor_version}, '.', 1)), 0) * 1000000000 +\n        // Year (2025) -> 202500000\n        coalesce(parseInt(substring(split(split({current_minor_version}, 'ru-', 2), '-', 1), 1, 4)), 0) * 100000 +\n        // Month (01 or 04) -> 100 or 400\n        coalesce(parseInt(substring(split(split({current_minor_version}, 'ru-', 2), '-', 2), 1, 2)), 0) * 100\n        ) + // Separate calculation for r value\n        coalesce(parseInt(right({current_minor_version}, 1)), 0),\n        // Original version handling\n        (coalesce(parseInt(split({current_minor_version}, '.', 1)), 0) * 10000 +\n         coalesce(\n            ifelse(\n                locate('-', split({current_minor_version}, '.', 2)) > 0,\n                parseInt(split(split({current_minor_version}, '.', 2), '-', 1)),\n                parseInt(split({current_minor_version}, '.', 2))\n            ), 0) * 100 +\n         coalesce(\n            ifelse(\n                locate('-', split({current_minor_version}, '.', 3)) > 0,\n                parseInt(split(split(split({current_minor_version}, '.', 3), '-', 1), '_', 1)),\n                parseInt(split(split({current_minor_version}, '.', 3), '_', 1))\n            ), 0))\n    )\n)"
          },
          {
            "DataSetIdentifier": "rds_analysis_dataset7",
            "Name": "extract_latest_minor_version",
            "Expression": "// First check if it's an Aurora version or RDS Oracle version\nifelse(\n    locate({selected_latest_minor_version},'aurora') > 0,\n    // Aurora version handling - modified weights and parsing\n    (coalesce(parseInt(split({selected_latest_minor_version}, '.', 1)), 0) * 10000000000 +\n     coalesce(parseInt(split({selected_latest_minor_version}, '.', 2)), 0) * 1000000000 +\n     coalesce(parseInt(split(split({selected_latest_minor_version}, 'aurora.', 2), '.', 1)), 0) * 1000000 +\n     // Handle the double-digit version numbers (04, 09) by padding\n     coalesce(parseInt(split(split({selected_latest_minor_version}, 'aurora.', 2), '.', 2)), 0) * 1000 +\n     coalesce(parseInt(split(split({selected_latest_minor_version}, 'aurora.', 2), '.', 3)), 0)),\n    \n    // Check if it's RDS Oracle version (contains 'ru-')\n    ifelse(\n        locate({selected_latest_minor_version},'ru-') > 0,\n        // Oracle version handling\n        (// Base version (19) -> 19000000000\n        coalesce(parseInt(split({selected_latest_minor_version}, '.', 1)), 0) * 1000000000 +\n        // Year (2025) -> 202500000\n        coalesce(parseInt(substring(split(split({selected_latest_minor_version}, 'ru-', 2), '-', 1), 1, 4)), 0) * 100000 +\n        // Month (01 or 04) -> 100 or 400\n        coalesce(parseInt(substring(split(split({selected_latest_minor_version}, 'ru-', 2), '-', 2), 1, 2)), 0) * 100\n        ) + // Separate calculation for r value\n        coalesce(parseInt(right({selected_latest_minor_version}, 1)), 0),\n        \n        // Original version handling\n        (coalesce(parseInt(split({selected_latest_minor_version}, '.', 1)), 0) * 10000 +\n         coalesce(\n            ifelse(\n                locate('-', split({selected_latest_minor_version}, '.', 2)) > 0,\n                parseInt(split(split({selected_latest_minor_version}, '.', 2), '-', 1)),\n                parseInt(split({selected_latest_minor_version}, '.', 2))\n            ), 0) * 100 +\n         coalesce(\n            ifelse(\n                locate('-', split({selected_latest_minor_version}, '.', 3)) > 0,\n                parseInt(split(split(split({selected_latest_minor_version}, '.', 3), '-', 1), '_', 1)),\n                parseInt(split(split({selected_latest_minor_version}, '.', 3), '_', 1))\n            ), 0))\n    )\n)"
          },
          {
            "DataSetIdentifier": "rds_analysis_dataset7",
            "Name": "extracted_compare_minor_version",
            "Expression": "ifelse(\n    contains({selected_latest_minor_version}, 'ru-'), \n    {selected_latest_minor_version},\n    ifelse(\n        contains({selected_latest_minor_version}, 'aurora'),\n        {selected_latest_minor_version},\n        ifelse(\n            contains({selected_latest_minor_version}, 'rur'),\n            {selected_latest_minor_version},\n            toString(\n                coalesce(parseInt(split({selected_latest_minor_version}, '.', 1)), 0) * 1000000 +\n                coalesce(parseInt(split({selected_latest_minor_version}, '.', 2)), 0) * 1000 +\n                coalesce(parseInt(split({selected_latest_minor_version}, '.', 3)), 0)\n            )\n        )\n    )\n)"
          },
          {
            "DataSetIdentifier": "rds_analysis_dataset7",
            "Name": "extracted_current_minor_version",
            "Expression": "ifelse(\n    contains({current_minor_version}, 'ru-'), \n    {current_minor_version},\n    ifelse(\n        contains({current_minor_version}, 'aurora'),\n        {current_minor_version},\n        ifelse(\n            contains({current_minor_version}, 'rur'),\n            {current_minor_version},\n            toString(\n                coalesce(parseInt(split({current_minor_version}, '.', 1)), 0) * 1000000 +\n                coalesce(parseInt(split({current_minor_version}, '.', 2)), 0) * 1000 +\n                coalesce(parseInt(split({current_minor_version}, '.', 3)), 0)\n            )\n        )\n    )\n)"
