          {
            "DataSetIdentifier": "rds_analysis_dataset7",
            "Name": "selected_majorversion_status",
            "Expression": "ifelse(\n    isNull({selected_latest_major_version}) or {selected_latest_major_version} = '',\n    'True',\n    ifelse(\n        isNull({current_major_version}) or {current_major_version} = '',\n        'True',\n        ifelse(\n        contains(toString({current_major_version}), '.'),\n        ifelse(\n            parseInt(split({current_major_version}, '.', 1)) * 100 + parseInt(split({current_major_version}, '.', 2)) >=\n            parseInt(split({selected_latest_major_version}, '.', 1)) * 100 + parseInt(split({selected_latest_major_version}, '.', 2)),\n            'True',\n            'False'\n        ),\n        ifelse(\n            parseInt({current_major_version}) >= parseInt({selected_latest_major_version}),\n            'True',\n            'False'\n        )\n    )\n)\n)"
