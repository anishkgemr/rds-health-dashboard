                    "CustomNarrative": {
                      "Narrative": "<narrative>\n  <inline font-size=\"19.2px\">&#128260;\u00a0</inline>\n  <inline font-size=\"19.2px\">\n    <b>RDS DB Snapshot Backup month over month insights for\u00a0</b>\n  </inline>\n  <inline font-size=\"19.2px\">\n    <b>\n      <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n    </b>\n  </inline>\n  <br/>\n  <br/>\n  <inline font-size=\"19.2px\">Average Backup Percentage for\u00a0</inline>\n  <inline font-size=\"19.2px\">\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n  </inline>\n  <if condition=\"PeriodOverPeriod.percentDifference.value &gt;= 0\" level=\"inline\">\n    <inline color=\"Accent\" font-size=\"19.2px\">\n      <b>\u00a0</b>\n    </inline>\n    <inline color=\"#92ac61\" font-size=\"19.2px\">\n      <b>increased by</b>\n    </inline>\n    <inline color=\"Accent\" font-size=\"19.2px\">\n      <b>\u00a0</b>\n    </inline>\n  </if>\n  <if condition=\"PeriodOverPeriod.percentDifference.value &lt; 0\" level=\"inline\">\n    <inline color=\"#e86b5f\" font-size=\"19.2px\">\n      <b>\u00a0decreased by</b>\n    </inline>\n    <inline color=\"Accent\" font-size=\"19.2px\">\n      <b>\u00a0\u00a0</b>\n    </inline>\n  </if>\n  <inline color=\"Accent\" font-size=\"19.2px\">\n    <b>\u00a0</b>\n  </inline>\n  <inline color=\"Accent\" font-size=\"19.2px\">\n    <b>\n      <expression>PeriodOverPeriod.absoluteDifference.formattedValue</expression>\n    </b>\n  </inline>\n  <inline color=\"Accent\" font-size=\"19.2px\">\n    <b>\u00a0\u00a0</b>\n  </inline>\n  <inline font-size=\"19.2px\">from\u00a0</inline>\n  <inline font-size=\"19.2px\">\n    <b>\n      <expression>PeriodOverPeriod.previousMetricValue.formattedValue</expression>\n    </b>\n  </inline>\n  <inline font-size=\"19.2px\">\u00a0to\u00a0</inline>\n  <inline font-size=\"19.2px\">\n    <b>\n      <expression>PeriodOverPeriod.currentMetricValue.formattedValue</expression>\n    </b>\n  </inline>\n  <inline font-size=\"19.2px\">.</inline>\n  <br/>\n  <br/>\n  \u2197\ufe0fTop Movers :\n  <br/>\n  <if condition=\"TopMovers.itemsCount = 0\" level=\"inline\">\n    \u00a0No Top movers for\u00a0\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n    \u00a0\n  </if>\n  \u00a0\n  <br/>\n  <if condition=\"TopMovers.itemsCount &gt; 0\" level=\"block\">\n    &#128314;There is\u00a0\n    <b>\n      <expression>TopMovers.itemsCount</expression>\n    </b>\n    \u00a0top mover for the month of\u00a0\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n    \u00a0:\n  </if>\n  <br/>\n  <for level=\"block\" listExpression=\"TopMovers.items\">\n    <ul>\n      <li class=\"ql-indent-0\">\n        \u00a0Account\u00a0\n        <b>\n          <expression>TopMovers.items[index].categoryValue.value</expression>\n        </b>\n        \u00a0backup percentage\n        <inline color=\"#92ac61\">\n          <b>\u00a0increased from</b>\n        </inline>\n        \u00a0\n        <b>\n          <expression>TopMovers.items[index].previousMetricValue.formattedValue</expression>\n        </b>\n        \u00a0in\u00a0\n        <expression>PeriodToDate.previousTimeValue.formattedValue</expression>\n        \u00a0to\u00a0\n        <b>\n          <expression>TopMovers.items[index].currentMetricValue.formattedValue</expression>\n        </b>\n        \u00a0in\u00a0\n        <expression>PeriodToDate.currentTimeValue.formattedValue</expression>\n      </li>\n    </ul>\n  </for>\n  <br/>\n  <br/>\n  \u2198\ufe0f Bottom Movers :\n  <br/>\n  <if condition=\"BottomMovers.itemsCount = 0\" level=\"inline\">\n    \u00a0No Bottom Movers for\u00a0\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n  </if>\n  <br/>\n  <if condition=\"BottomMovers.itemsCount &gt; 0\" level=\"block\">\n    &#128315;There is\u00a0\n    <expression>BottomMovers.itemsCount</expression>\n    \u00a0bottom movers for the month of\u00a0\n    <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n    \u00a0:\n  </if>\n  <br/>\n  <for level=\"block\" listExpression=\"BottomMovers.items\">\n    <ul>\n      <li class=\"ql-indent-0\">\n        \u00a0Account\u00a0\n        <b>\n          <expression>BottomMovers.items[index].categoryValue.value</expression>\n        </b>\n        \u00a0backup percentage\u00a0\n        <inline color=\"#e86b5f\">\n          <b>decreased from</b>\n        </inline>\n        \u00a0\n        <b>\n          <expression>BottomMovers.items[index].previousMetricValue.formattedValue</expression>\n        </b>\n        \u00a0in\u00a0\n        <expression>PeriodToDate.previousTimeValue.formattedValue</expression>\n        \u00a0to\u00a0\n        <b>\n          <expression>BottomMovers.items[index].currentMetricValue.formattedValue</expression>\n        </b>\n        \u00a0in\u00a0\n        <expression>PeriodToDate.currentTimeValue.formattedValue</expression>\n      </li>\n    </ul>\n  </for>\n  <br/>\n  <br/>\n  &#128161; Key Insights:\n  <br/>\n  <ul>\n    <li class=\"ql-indent-0\">\n      <if condition=\"BottomMovers.itemsCount&gt;0\" level=\"inline\">\u00a0Atleast\u00a0</if>\n      <expression>BottomMovers.itemsCount</expression>\n      \u00a0\u00a0account[s] require immediate attention\u00a0\n      <if condition=\"BottomMovers.itemsCount&lt;0\" level=\"inline\">\n        No Bottom movers for the month of\u00a0\n        <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n      </if>\n      \u00a0\n    </li>\n    <li class=\"ql-indent-0\">\n      \u00a0\n      <if condition=\"TopMovers.itemsCount&gt;0\" level=\"inline\"/>\n      Total\u00a0\n      <expression>TopMovers.itemsCount</expression>\n      \u00a0account[s] showed improved backup coverage\u00a0\u00a0\n      <if condition=\"TopMovers.itemsCount&lt;0\" level=\"inline\">\n        \u00a0No top movers for the month of\u00a0\n        <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n      </if>\n      \u00a0\n    </li>\n    <li class=\"ql-indent-0\">\n      <if condition=\"PeriodOverPeriod.percentDifference.value &gt;= 0\" level=\"inline\">\n        Overall RDS Backup Coverage improved in\u00a0\n        <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n      </if>\n      \u00a0\n      <if condition=\"PeriodOverPeriod.percentDifference.value &lt; 0\" level=\"inline\">\n        Overall RDS Backup Coverage declined in\u00a0\n        <expression>PeriodOverPeriod.currentTimeValue.formattedValue</expression>\n      </if>\n    </li>\n    <li class=\"ql-indent-0\">\n      <if condition=\"BottomMovers.itemsCount&gt;0\" level=\"inline\"/>\n      <b>\u00a0Recommended Action\u00a0</b>\n      : Review backup policies for declining account[s]\n    </li>\n  </ul>\n</narrative>"
                    }
                  },
